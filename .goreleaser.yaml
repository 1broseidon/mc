version: 2

project_name: mc

builds:
  - id: mycomputer
    main: ./cmd/mycomputer
    binary: mycomputer
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version=v{{ .Version }}
      - -X main.commit={{ .ShortCommit }}
      - -X main.built={{ .Date }}

archives:
  - id: mycomputer
    ids:
      - mycomputer
    formats:
      - tar.gz
    name_template: "mycomputer_{{ .Version }}_linux_{{ .Arch }}"

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
